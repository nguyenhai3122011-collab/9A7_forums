<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9A7 - Forum Siêu Tốc</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }
        .header { color: #2c3e50; text-align: center; margin-bottom: 20px; }
        
        /* Khung nhập bài */
        .post-form { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 30px; }
        input, textarea { width: 100%; margin-bottom: 12px; padding: 12px; border: 1.5px solid #eee; border-radius: 10px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus, textarea:focus { border-color: #3498db; }
        button { background: #3498db; color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:hover { background: #2980b9; }

        /* Danh sách bài viết */
        .post-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); position: relative; }
        .user-name { font-weight: bold; color: #34495e; display: block; margin-bottom: 5px; }
        .post-time { font-size: 11px; color: #95a5a6; position: absolute; top: 15px; right: 15px; }
        .post-text { color: #444; line-height: 1.5; }
        .post-img { width: 100%; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>Lớp 9A7 Forum</h1></div>

    <div class="post-form">
        <input type="text" id="name" placeholder="Tên bạn (Bỏ trống để ẩn danh)">
        <textarea id="content" rows="3" placeholder="Hôm nay lớp mình có gì hot?"></textarea>
        <input type="text" id="image" placeholder="Dán link ảnh (nếu có)">
        <button id="btnSend" onclick="addPost()">Đăng bài</button>
    </div>

    <div id="listPosts">Đang tải bài viết...</div>
</div>

<script>
    // DÁN LINK MOCKAPI CỦA BẠN VÀO ĐÂY
    const API_URL = "https://69c6a848f272266f3eaceee2.mockapi.io/post"; 

    // 1. Tải bài viết
    async function loadPosts() {
        const res = await fetch(API_URL);
        const posts = await res.json();
        const div = document.getElementById('listPosts');
        div.innerHTML = "";
        
        // Hiện bài mới nhất lên đầu
        posts.reverse().forEach(p => {
            const time = new Date(p.createdAt).toLocaleString('vi-VN');
            div.innerHTML += `
                <div class="post-card">
                    <span class="user-name">👤 ${p.name || "Ẩn danh"}</span>
                    <span class="post-time">${time}</span>
                    <div class="post-text">${p.content}</div>
                    ${p.image ? `<img src="${p.image}" class="post-img">` : ""}
                </div>
            `;
        });
    }

    // 2. Thêm bài viết mới
    async function addPost() {
        const name = document.getElementById('name').value.trim();
        const content = document.getElementById('content').value.trim();
        const image = document.getElementById('image').value.trim();
        const btn = document.getElementById('btnSend');

        if (!content) return alert("Bạn chưa nhập nội dung!");

        btn.disabled = true;
        btn.innerText = "Đang gửi...";

        await fetch(API_URL, {
            method: 'POST',
            headers: {'content-type':'application/json'},
            body: JSON.stringify({ name, content, image })
        });

        // Reset form và tải lại
        document.getElementById('content').value = "";
        document.getElementById('image').value = "";
        btn.disabled = false;
        btn.innerText = "Đăng bài";
        loadPosts();
    }

    loadPosts(); // Chạy ngay khi mở web
</script>

</body>
</html>
