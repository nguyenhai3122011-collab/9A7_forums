<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9A7 - Forum Siêu Tốc</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }
        .header { color: #2c3e50; text-align: center; margin-bottom: 20px; }
        
        /* Khung nhập bài */
        .post-form { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 30px; }
        input, textarea { width: 100%; margin-bottom: 12px; padding: 12px; border: 1.5px solid #eee; border-radius: 10px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus, textarea:focus { border-color: #3498db; }
        button { background: #3498db; color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:hover { background: #2980b9; }

        /* Danh sách bài viết */
        .post-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); position: relative; }
        .user-name { font-weight: bold; color: #34495e; display: block; margin-bottom: 5px; }
        .post-time { font-size: 11px; color: #95a5a6; position: absolute; top: 15px; right: 15px; }
        .post-text { color: #444; line-height: 1.5; white-space: pre-wrap; }
        .post-img { width: 100%; border-radius: 8px; margin-top: 10px; display: block; }
        #errorMessage { color: red; font-size: 13px; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>Lớp 9A7 Forum</h1></div>
    <div id="errorMessage"></div>

    <div class="post-form">
        <input type="text" id="name" placeholder="Tên bạn (Bỏ trống để ẩn danh)">
        <textarea id="content" rows="3" placeholder="Hôm nay lớp mình có gì hot?"></textarea>
        <input type="text" id="image" placeholder="Dán link ảnh (nếu có)">
        <button id="btnSend" onclick="addPost()">Đăng bài</button>
    </div>

    <div id="listPosts">Đang tải bài viết...</div>
</div>

<script>
    // Kiểm tra kỹ link này: Nếu bạn tạo Resource là "posts" thì phải có chữ "s"
    const API_URL = "https://69c6a848f272266f3eaceee2.mockapi.io/post"; 

    // 1. Tải bài viết
    async function loadPosts() {
        try {
            const res = await fetch(API_URL);
            if (!res.ok) throw new Error("Không tìm thấy dữ liệu (404). Hãy kiểm tra lại tên Resource trong MockAPI!");
            
            const posts = await res.json();
            const div = document.getElementById('listPosts');
            div.innerHTML = "";
            
            if (posts.length === 0) {
                div.innerHTML = "<p style='text-align:center; color:#888;'>Chưa có bài đăng nào.</p>";
                return;
            }

            // Đảo ngược mảng để bài mới nhất lên đầu
            [...posts].reverse().forEach(p => {
                const time = p.createdAt ? new Date(p.createdAt).toLocaleString('vi-VN') : "Vừa xong";
                div.innerHTML += `
                    <div class="post-card">
                        <span class="user-name">👤 ${p.name || "Ẩn danh"}</span>
                        <span class="post-time">${time}</span>
                        <div class="post-text">${p.content}</div>
                        ${p.image ? `<img src="${p.image}" class="post-img" onerror="this.style.display='none'">` : ""}
                    </div>
                `;
            });
            document.getElementById('errorMessage').innerText = "";
        } catch (error) {
            document.getElementById('listPosts').innerHTML = "Lỗi tải dữ liệu.";
            document.getElementById('errorMessage').innerText = error.message;
        }
    }

    // 2. Thêm bài viết mới
    async function addPost() {
        const nameInput = document.getElementById('name');
        const contentInput = document.getElementById('content');
        const imageInput = document.getElementById('image');
        const btn = document.getElementById('btnSend');

        const name = nameInput.value.trim();
        const content = contentInput.value.trim();
        const image = imageInput.value.trim();

        if (!content) return alert("Bạn chưa nhập nội dung!");

        btn.disabled = true;
        btn.innerText = "Đang gửi...";

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {'content-type':'application/json'},
                body: JSON.stringify({ 
                    name: name || "Ẩn danh", 
                    content: content, 
                    image: image,
                    createdAt: new Date().toISOString() 
                })
            });

            if (response.ok) {
                // Xóa nội dung cũ
                contentInput.value = "";
                imageInput.value = "";
                // Tải lại danh sách bài đăng
                await loadPosts();
            } else {
                alert("Lỗi khi gửi bài!");
            }
        } catch (error) {
            alert("Không thể kết nối đến máy chủ!");
        } finally {
            btn.disabled = false;
            btn.innerText = "Đăng bài";
        }
    }

    // Chạy ngay khi mở web
    loadPosts();
</script>

</body>
</html>
